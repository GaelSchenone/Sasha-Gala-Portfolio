version: '3.8'

services:
  flask-api:
    build: ./server-flask
    container_name: sasha-portfolio-api
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - SERVER_PORT=5000
      - PROJECT_ROOT=/app
      - UPLOAD_FOLDER=/app/uploads
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - JWT_SECRET=${JWT_SECRET}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    networks:
      - sasha-portfolio

  react-frontend:
    build: ./client-react
    container_name: sasha-portfolio-frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:5000}
      - VITE_IMG_BASE=${VITE_IMG_BASE:-http://localhost:5000}
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    depends_on:
      - flask-api
    restart: unless-stopped
    networks:
      - sasha-portfolio

volumes:
  uploads:

networks:
  sasha-portfolio:
    driver: bridge
